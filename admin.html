<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNOREIYA カード管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>UNOREIYA カード管理</h1>
        <p>カード情報を入力して、cards.jsに貼り付けられるデータを生成します。</p>
        <nav>
          <a href="settings.html">選択肢管理</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <form id="cardForm" class="admin-form">
      <div class="form-grid">
        <div class="form-row form-row--three">
          <div class="field-group field-group--small">
            <label for="id">カードID</label>
            <input type="text" id="id" placeholder="例: WC001">
          </div>
          <div class="field-group field-group--wide">
            <label for="name">カード名</label>
            <input type="text" id="name" placeholder="例: ブーメラン　＋2">
          </div>
</div>

      <div class="form-row form-row--full">
        <div class="field-group full-width">
          <label for="effectFull">テキスト</label>
          <textarea id="effectFull" placeholder="カードの効果・説明・効果名などをまとめて入力してください"></textarea>
          </div>
        </div>

        <div class="form-row form-row--three">
          <div class="field-group field-group--medium">
            <label for="series">シーズン</label>
            <select id="series">
              <option value="">選択してください</option>
              <option value="Original">Original</option>
              <option value="Special">Special</option>
              <option value="Stock制">Stock制</option>
              <option value="UNO Flip">UNO Flip</option>
              <option value="High Class">High Class</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="field-group field-group--medium">
            <label for="category">カテゴリ</label>
            <select id="category">
              <option value="">選択してください</option>
              <option value="キャラクターカード">キャラクターカード</option>
              <option value="SPカード">SPカード</option>
              <option value="フィールドカード">フィールドカード</option>
              <option value="ボスカード">ボスカード</option>
              <option value="High Class">High Class</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="field-group field-group--medium">
            <label for="type">タイプ</label>
            <select id="type">
              <option value="">選択してください</option>
              <option value="攻撃">攻撃</option>
              <option value="防御">防御</option>
              <option value="妨害">妨害</option>
              <option value="サポート">サポート</option>
              <option value="ドロー">ドロー</option>
              <option value="交換">交換</option>
              <option value="特殊">特殊</option>
              <option value="その他">その他</option>
            </select>
          </div>
        </div>

        <div class="form-row form-row--full">
          <div class="field-group full-width">
            <label>タグ</label>
            <div class="tag-input-group">
              <select id="tagSelect"></select>
              <button type="button" id="addTagBtn">タグを追加</button>
            </div>
            <div id="selectedTags" class="selected-tags"></div>
          </div>
        </div>

        <div class="form-row form-row--full">
          <div class="field-group full-width">
            <label for="keywords">検索ワード (カンマ区切り)</label>
            <input type="text" id="keywords" placeholder="例: ブーメランプラス2,ぶーめらんぷらす2">
          </div>
        </div>

        <div class="form-row form-row--two">
          <div class="field-group field-group--wide">
            <label for="image">画像URL</label>
            <input type="text" id="image" placeholder="例: images/sp001.png (空でもOK)">
          </div>
          <div class="field-group field-group--small">
            <label for="viewImage">画像を見る</label>
            <input type="text" id="viewImage" placeholder="例: Yes / No">
          </div>
        </div>
      </div>
      <button type="button" id="generateBtn">カードデータを生成</button>
      <button type="button" id="addBtn">追加</button>
      <button type="button" id="updateBtn" style="display:none;">更新</button>
    </form>

    <div id="cardList">
      <h2>登録済みカード一覧 (<span id="cardCount">0</span>件 / 全<span id="cardTotalCount">0</span>件)</h2>
      <div class="search-panel admin-filter-panel">
        <div class="field-group">
          <label for="adminSearchInput">一覧検索</label>
          <input type="text" id="adminSearchInput" placeholder="カードID・名前・効果・タグなどを検索">
        </div>
        <div class="field-group">
          <label for="filterCategory">カテゴリ</label>
          <select id="filterCategory">
            <option value="">すべて</option>
            <option value="キャラクターカード">キャラクターカード</option>
            <option value="SPカード">SPカード</option>
            <option value="フィールドカード">フィールドカード</option>
            <option value="ボスカード">ボスカード</option>
            <option value="High Class">High Class</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field-group">
          <label for="filterSeries">シーズン</label>
          <select id="filterSeries">
            <option value="">すべて</option>
            <option value="Original">Original</option>
            <option value="Special">Special</option>
            <option value="Stock制">Stock制</option>
            <option value="UNO Flip">UNO Flip</option>
            <option value="High Class">High Class</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field-group">
          <label for="filterType">タイプ</label>
          <select id="filterType">
            <option value="">すべて</option>
            <option value="攻撃">攻撃</option>
            <option value="防御">防御</option>
            <option value="妨害">妨害</option>
            <option value="サポート">サポート</option>
            <option value="ドロー">ドロー</option>
            <option value="交換">交換</option>
            <option value="特殊">特殊</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>
      <button type="button" id="importBtn">cards.jsから取り込む</button>
      <div id="cardsContainer"></div>
    </div>

    <div class="admin-output">
      <h2>生成されたカードデータ</h2>
      <textarea id="output" readonly></textarea>
      <button type="button" id="copyBtn">コピー</button>
    </div>

    <div class="admin-output">
      <h2>cards.js用データ出力</h2>
      <button type="button" id="exportBtn">cards.js用データを出力</button>
      <textarea id="exportOutput" readonly></textarea>
      <button type="button" id="copyExportBtn">コピー</button>
    </div>

    <div class="admin-output">
      <h2>管理データバックアップ</h2>
      <button type="button" id="backupExportBtn">管理データをバックアップ出力</button>
      <textarea id="backupOutput" readonly placeholder="ここにバックアップJSONが表示されます"></textarea>
      <button type="button" id="copyBackupBtn">コピー</button>
      <h3>バックアップから復元</h3>
      <textarea id="backupInput" placeholder="ここにバックアップJSONを貼り付けてください"></textarea>
      <button type="button" id="backupImportBtn">バックアップを読み込む</button>
      <button type="button" id="clearAllBtn">管理データを全削除</button>
    </div>
  </main>

  <script src="cards.js"></script>
  <script src="admin.js"></script>
</body>
</html>
