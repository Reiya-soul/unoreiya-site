<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNOREIYA カード管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section id="adminLogin" class="admin-login">
    <form id="adminLoginForm" class="admin-login-box">
      <h1>UNOREIYA カード管理</h1>
      <p>管理画面を開くにはパスワードを入力してください。</p>
      <label for="adminPassword">パスワード</label>
      <input type="password" id="adminPassword" autocomplete="current-password">
      <p id="adminLoginError" class="admin-login-error" hidden>パスワードが違います</p>
      <button type="submit">ログイン</button>
    </form>
  </section>

  <div id="adminContent" hidden>
  <header>
    <div class="header-inner">
      <div>
        <h1>UNOREIYA カード管理</h1>
        <p>カード情報を登録・編集して、カード図鑑へ反映します。</p>
        <nav class="page-nav" aria-label="管理ページ切り替え">
          <a href="admin.html" class="active" aria-current="page">カード管理</a>
          <a href="settings.html">選択肢管理</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <form id="cardForm" class="admin-form">
      <div class="form-grid">
        <div class="form-row form-row--three">
          <div class="field-group field-group--small">
            <label for="id">カードID</label>
            <input type="text" id="id" placeholder="例: WC001">
          </div>
          <div class="field-group field-group--wide">
            <label for="name">カード名</label>
            <input type="text" id="name" placeholder="例: ブーメラン　＋2">
          </div>
</div>

      <div class="form-row form-row--full">
        <div class="field-group full-width">
          <div class="textarea-label-row">
            <label for="effectFull">テキスト</label>
            <button type="button" id="boldTextBtn" class="format-button">太字</button>
          </div>
          <textarea id="effectFull" placeholder="カードの効果・説明・効果名などをまとめて入力してください"></textarea>
          </div>
        </div>

        <div class="form-row form-row--three">
          <div class="field-group field-group--medium">
            <label for="series">シーズン</label>
            <select id="series">
              <option value="">選択してください</option>
              <option value="Original">Original</option>
              <option value="Special">Special</option>
              <option value="Stock制">Stock制</option>
              <option value="UNO Flip">UNO Flip</option>
              <option value="High Class">High Class</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="field-group field-group--medium">
            <label for="category">カテゴリ</label>
            <select id="category">
              <option value="">選択してください</option>
              <option value="キャラクターカード">キャラクターカード</option>
              <option value="SPカード">SPカード</option>
              <option value="フィールドカード">フィールドカード</option>
              <option value="ボスカード">ボスカード</option>
              <option value="High Class">High Class</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="field-group field-group--medium">
            <label for="type">タイプ</label>
            <select id="type">
              <option value="">選択してください</option>
              <option value="攻撃">攻撃</option>
              <option value="防御">防御</option>
              <option value="妨害">妨害</option>
              <option value="サポート">サポート</option>
              <option value="ドロー">ドロー</option>
              <option value="交換">交換</option>
              <option value="特殊">特殊</option>
              <option value="その他">その他</option>
            </select>
          </div>
        </div>

        <div class="form-row form-row--full">
          <div class="field-group full-width">
            <label>タグ</label>
            <div class="tag-input-group">
              <select id="tagSelect"></select>
              <button type="button" id="addTagBtn">タグを追加</button>
            </div>
            <div id="selectedTags" class="selected-tags"></div>
          </div>
        </div>

        <div class="form-row form-row--full">
          <div class="field-group full-width">
            <label for="keywords">検索ワード (カンマ区切り)</label>
            <input type="text" id="keywords" placeholder="例: ブーメランプラス2,ぶーめらんぷらす2">
          </div>
        </div>

        <div class="form-row form-row--full">
          <input type="hidden" id="image">
          <div class="field-group full-width">
            <label for="imageFile">画像ファイルを選択</label>
            <input type="file" id="imageFile" accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp">
            <p id="uploadImageStatus" class="upload-status"></p>
            <div class="related-admin-panel">
              <label for="relatedCardSearch">関連</label>
              <input type="text" id="relatedCardSearch" placeholder="カード名・IDで検索">
              <div id="relatedCardSearchResults" class="related-search-results"></div>
              <div id="selectedRelatedCards" class="selected-related-cards"></div>
            </div>
          </div>
        </div>

        <div class="form-row form-row--full">
          <div class="field-group full-width">
            <label>画像プレビュー</label>
            <div class="admin-image-preview">
              <img id="imagePreview" src="" alt="画像プレビュー">
              <div id="imagePreviewPlaceholder" class="image-placeholder">No Image</div>
            </div>
          </div>
        </div>
      </div>
      <button type="button" id="addBtn">追加</button>
      <button type="button" id="updateBtn" style="display:none;">更新</button>
      <button type="button" id="cancelBtn" class="cancel-button">キャンセル</button>
    </form>

    <div id="cardList">
      <h2>登録済みカード一覧 (<span id="cardCount">0</span>件 / 全<span id="cardTotalCount">0</span>件)</h2>
      <div class="search-panel admin-filter-panel">
        <div class="field-group">
          <label for="adminSearchInput">一覧検索</label>
          <input type="text" id="adminSearchInput" placeholder="カードID・名前・効果・タグなどを検索">
        </div>
        <div class="field-group">
          <label for="filterCategory">カテゴリ</label>
          <select id="filterCategory">
            <option value="">すべて</option>
            <option value="キャラクターカード">キャラクターカード</option>
            <option value="SPカード">SPカード</option>
            <option value="フィールドカード">フィールドカード</option>
            <option value="ボスカード">ボスカード</option>
            <option value="High Class">High Class</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field-group">
          <label for="filterSeries">シーズン</label>
          <select id="filterSeries">
            <option value="">すべて</option>
            <option value="Original">Original</option>
            <option value="Special">Special</option>
            <option value="Stock制">Stock制</option>
            <option value="UNO Flip">UNO Flip</option>
            <option value="High Class">High Class</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field-group">
          <label for="filterType">タイプ / モード</label>
          <select id="filterType">
            <option value="">すべて</option>
            <option value="攻撃">攻撃</option>
            <option value="防御">防御</option>
            <option value="妨害">妨害</option>
            <option value="サポート">サポート</option>
            <option value="ドロー">ドロー</option>
            <option value="交換">交換</option>
            <option value="特殊">特殊</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>
      <div id="cardsContainer"></div>
    </div>

  </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="admin.js?v=20260510-order-1"></script>
</body>
</html>
