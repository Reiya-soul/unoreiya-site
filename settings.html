<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNOREIYA Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>UNOREIYA Settings</h1>
        <p>Manage card option values for the admin form and catalog filters.</p>
        <nav class="page-nav" aria-label="Admin pages">
          <a href="admin.html">Card Admin</a>
          <a href="settings.html" class="active" aria-current="page">Option Settings</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <p id="settingsStatus" role="status" aria-live="polite"></p>

    <section id="seasonsSection" class="settings-section">
      <h2>Series</h2>
      <div class="settings-form">
        <input type="text" id="seasonInput" placeholder="New series">
        <button type="button" id="addSeasonBtn">Add</button>
        <button type="button" id="updateSeasonBtn" style="display:none;">Update</button>
      </div>
      <ul id="seasonsList" class="settings-list"></ul>
    </section>

    <section id="categoriesSection" class="settings-section">
      <h2>Category</h2>
      <div class="settings-form">
        <input type="text" id="categoryInput" placeholder="New category">
        <button type="button" id="addCategoryBtn">Add</button>
        <button type="button" id="updateCategoryBtn" style="display:none;">Update</button>
      </div>
      <ul id="categoriesList" class="settings-list"></ul>
    </section>

    <section id="typesSection" class="settings-section">
      <h2>Type</h2>
      <div class="settings-form">
        <input type="text" id="typeInput" placeholder="New type">
        <button type="button" id="addTypeBtn">Add</button>
        <button type="button" id="updateTypeBtn" style="display:none;">Update</button>
      </div>
      <ul id="typesList" class="settings-list"></ul>
    </section>

    <section id="tagsSection" class="settings-section">
      <h2>Tag</h2>
      <div class="settings-form">
        <input type="text" id="tagInput" placeholder="New tag">
        <button type="button" id="addTagBtn">Add</button>
        <button type="button" id="updateTagBtn" style="display:none;">Update</button>
      </div>
      <ul id="tagsList" class="settings-list"></ul>
    </section>

    <section id="modesSection" class="settings-section">
      <h2>Mode</h2>
      <div class="settings-form">
        <input type="text" id="modeInput" placeholder="New mode">
        <button type="button" id="addModeBtn">Add</button>
        <button type="button" id="updateModeBtn" style="display:none;">Update</button>
      </div>
      <ul id="modesList" class="settings-list"></ul>
    </section>
  </main>

  <script type="module" src="settings.js"></script>
</body>
</html>
