<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNOREIYA カード図鑑</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>UNOREIYA カード図鑑</h1>
        <p>キーワード・カテゴリ・シーズン・タグ・モードでカードを絞り込めます。</p>
      </div>
    </div>
  </header>

  <main>
    <section class="search-panel">
      <div class="search-row search-row--full">
        <div class="field-group">
          <label for="searchInput">キーワード検索</label>
          <input type="text" id="searchInput" placeholder="カード名・ID・テキスト・タグなどを入力">
        </div>
      </div>
      <div class="search-row search-row--three">
        <div class="field-group">
          <label for="categoryFilter">カテゴリ</label>
          <select id="categoryFilter">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="field-group">
          <label for="seriesFilter">シーズン</label>
          <select id="seriesFilter">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="field-group">
          <label for="modeFilter">モード</label>
          <select id="modeFilter">
            <option value="">すべて</option>
          </select>
        </div>
      </div>
      <div class="search-row search-row--full">
        <div class="field-group">
          <label>タグ</label>
          <div id="tagFilter" class="tag-filter"></div>
        </div>
      </div>
    </section>

    <section id="cardList" class="card-grid"></section>
    <div id="dataStatus" class="data-status"></div>
    <div id="noResults" class="no-results" hidden>検索条件に一致するカードがありません。</div>
  </main>

  <div id="cardModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div class="modal-body">
        <img id="modalImage" src="" alt="" class="modal-image">
        <div id="modalImagePlaceholder" class="image-placeholder" style="display:none;">No Image</div>
        <div class="modal-details">
          <h2 id="modalName"></h2>
          <p><strong>ID: </strong><span id="modalId"></span></p>
          <p><strong>カテゴリ：</strong><span id="modalCategory"></span></p>
          <p><strong>シーズン：</strong><span id="modalSeries"></span></p>
          <p><strong>モード：</strong><span id="modalType"></span></p>
          <p class="modal-effect-label"><strong>効果全文</strong></p>
          <p id="modalEffect" class="modal-effect"></p>
          <p><strong>タグ：</strong></p>
          <div id="modalTags" class="modal-tags"></div>
          <p><strong>検索ワード：</strong></p>
          <div id="modalKeywords" class="modal-tags"></div>
        </div>
      </div>
      <button onclick="closeModal()" class="back-button">カード一覧に戻る</button>
    </div>
  </div>

  <script src="cards.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
